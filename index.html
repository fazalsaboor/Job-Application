<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <div class="apply_box">
        <h1>
            JOb Application
            <span class="title_small"> (web)</span>
        </h1>
        <form action="">
            <div class="form_container">
                <div class="form_control">
                    <label for="first_name"> First Name</label>
                    <input id="first_name" name="first_name" placeholder="Enter First Name..." />
                    </div>
                    <div class="form_control">
                        <label for="last_name"> Last Name</label>
                        <input id="last_name" name="last_name" placeholder="Enter last Name..." />
                    </div>
                    <div class="form_control">
                        <label for="Email"> Email</label>
                        <input type="email" id="email" name="email" placeholder="email..." />
                    </div>
                    <div class="form_control">
                        <label for="job_role"> Job Role</label>
                        <select id="job_role" name="job_role">
                            <option value="">Select Job Role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="full_stack">Full Stack Developer</option>
                            <option value="ui_ux">UI UX Designer</option>
                        </select>
                    </div>
                    <div class="textarea_control">
                        <label for="Address">Address</label>
                        <textarea id="Address" name="Address" rows="4" cols="50" placeholder="Enter Address"></textarea>
                     </div>
                    <div class="form_control">
                    <label for="City">City</label>
                    <input id="City" name="City" placeholder="City...">
                </div>
                    <div class="form_control">
                    <label for="Pin_code">Pin code</label>
                    <input type="number" id="Pin_code" name="Pin_code" placeholder="Pin_code...">
                </div>
                 <div class="form_control">
                    <label for="Start_Date">Start Date</label>
                    <input type="date" id="Start_Date"name="Start_Date"placeholder="Start_Date"...>
                 </div>
                 <div class="form_control">
                    <label class="upload">upload</label>
                    <input type="file"id="upload"name="upload"...>
                 </div>
                
           <div class="button_container">
                    <button type="submit">Apply Now</button>
                </div>
                     
    </form>
</div>
</div>
</body>
</html>
